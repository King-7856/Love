<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sangida ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #fff0f0, #ffb3c6);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* floating hearts */
.bg-heart {
    position: absolute;
    color: #ff4d6d;
    opacity: 0.3;
    animation: float 8s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh); opacity:0;}
    50% {opacity:0.6;}
    100% {transform: translateY(-10vh); opacity:0;}
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.85);
    padding: 50px;
    border-radius: 25px;
    z-index: 10;
}

h1 {
    font-size: 32px;
    color: #d63384;
    margin-bottom: 20px;
}

img {
    width: 220px;
    border-radius: 50%;
    margin-bottom: 20px;
}

button {
    padding: 14px 35px;
    font-size: 20px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

#yes {
    background: #ff4d6d;
    color: white;
}

#no {
    background: black;
    color: white;
    position: absolute;
}

/* heart burst */
.particle {
    position: absolute;
    animation: burst 1s forwards;
}

@keyframes burst {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}
</style>

</head>

<body>

<div id="bg"></div>

<div class="container">
    <img id="gif" src="https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif">
    <h1 id="text">Sangida, do you love me? ❤️</h1>

```
<button id="yes">Yes</button>
<button id="no">No</button>
```

</div>

<script>
const yes = document.getElementById("yes");
const no = document.getElementById("no");
const text = document.getElementById("text");
const gif = document.getElementById("gif");

/* floating hearts background */
function bgHearts() {
    for (let i = 0; i < 25; i++) {
        let h = document.createElement("div");
        h.className = "bg-heart";
        h.innerHTML = "❤️";

        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = (Math.random() * 20 + 15) + "px";
        h.style.animationDuration = (Math.random() * 5 + 5) + "s";

        document.getElementById("bg").appendChild(h);
    }
}
bgHearts();

/* NO button escape */
function moveNo() {
    let x = Math.random() * (window.innerWidth - no.offsetWidth);
    let y = Math.random() * (window.innerHeight - no.offsetHeight);

    no.style.left = x + "px";
    no.style.top = y + "px";
}

no.addEventListener("mouseenter", moveNo);
no.addEventListener("mousedown", (e) => {
    e.preventDefault();
    moveNo();
});
no.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveNo();
});

/* heart burst */
function hearts(e) {
    for (let i = 0; i < 50; i++) {
        let h = document.createElement("div");
        h.className = "particle";
        h.innerHTML = "❤️";

        let angle = Math.random() * 2 * Math.PI;
        let dist = Math.random() * 200;

        h.style.setProperty("--x", Math.cos(angle) * dist + "px");
        h.style.setProperty("--y", Math.sin(angle) * dist + "px");

        h.style.left = e.clientX + "px";
        h.style.top = e.clientY + "px";

        document.body.appendChild(h);

        setTimeout(() => h.remove(), 1000);
    }
}

/* YES click */
yes.addEventListener("click", (e) => {
    hearts(e);
    text.innerHTML = "Mujhe pta tha pehle hi ❤️😘";
    gif.src = "https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-hugs.gif";

    yes.style.display = "none";
    no.style.display = "none";
});
</script>

</body>
</html>
